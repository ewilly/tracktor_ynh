#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "tracktor"
name = "Tracktor"

description.en = "Vehicle Tracking Management System"

version = "1.2.1~ynh1"

maintainers = ["ewilly"]

[upstream]
license = "MIT"
demo = "https://tracktor.bytedge.in"
code = "https://github.com/javedh-dev/tracktor"

[integration]
yunohost = '>= 12.1.39'
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false
ldap = false
sso = false
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]

	[install.domain]
	type = "domain"

	[install.path]
	type = "path"
	default = "/tracktor"

	[install.init_main_permission]
	type = "group"
	default = "visitors"

[resources]

	[resources.sources]

		[resources.sources.main]
		url = "https://github.com/javedh-dev/tracktor/archive/refs/tags/1.2.1.tar.gz"
		sha256 = "5d1777ba24f02f134ec3bfe86e1690540cae8ebf6aad73907550d38c0e41345d"

		autoupdate.strategy = "latest_github_tag"

	[resources.permissions]
	main.url = "/"

	[resources.ports]

	[resources.nodejs]
	version = "24.10.0"
