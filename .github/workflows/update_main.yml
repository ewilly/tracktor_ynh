name: Create main promotion pull request
on:
  # Allow to manually trigger the workflow
  workflow_dispatch:
  # Run it when when someone pushes to testing
  push:
    branches:
      - testing
jobs:
  mainPromotion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Reset promotion branch
        run: |
          git fetch origin testing:testing
          git reset --hard testing
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: main-promotion
          title: 'Upgrade main from testing'
          body: |
            Upgrade main from testing
